name: Reset Staging DB to Production

# Manually triggered from the GitHub Actions tab
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset-staging" to confirm you want to reset the staging database to production state'
        required: true
        type: string

jobs:
  reset:
    name: Reset Staging Neon Branch
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'reset-staging'
    steps:
      - name: Reset Staging to Production
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: staging
          parent: true
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Confirm Reset
        run: echo "✅ Staging Neon branch has been reset to match production (main)"

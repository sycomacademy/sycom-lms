# PR-only: temp Neon branches for schema compatibility check; migrate on merge; cleanup.
name: Neon PR Schema Check

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - staging
      - main

concurrency:
  group: neon-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  DATABASE_URL: ${{ env.DATABASE_URL }}

jobs:
  # ── On PR open/sync: temp branches + generate/migrate + compatibility check ──
  pr_schema_check:
    name: Schema compatibility check
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create temp Neon branch (head)
        id: head_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.pull_request.number }}-head
          parent_branch: staging
          api_key: ${{ env.NEON_API_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and run migrations on head branch
        run: bun run db:generate && bun run db:migrate

      - name: Create temp Neon branch (compat test)
        id: compat_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.pull_request.number }}-compat
          parent_branch: staging
          api_key: ${{ env.NEON_API_KEY }}

      - name: Checkout base ref (target)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Apply target schema to compat branch
        run: bun run db:generate && bun run db:migrate

      - name: Checkout head ref again
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install dependencies (head)
        run: bun install --frozen-lockfile

      - name: Apply head migrations to compat branch (mergeability check)
        run: bun run db:migrate

      - name: Delete temp Neon branch (head)
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}-head
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete temp Neon branch (compat)
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}-compat
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

  # ── On PR closed: cleanup temp branches (and run migrate if merged into main/staging) ──
  on_pr_closed:
    name: On PR closed
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete temp Neon branches (cleanup)
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}-head
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete temp compat branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}-compat
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

  # ── Run migrations on target when PR is merged (only if target is main or staging) ──
  migrate_on_merge:
    name: Migrate on PR merge
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged code (target branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check for schema or migration changes
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'packages/db/schema/' 'packages/db/migrations/' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.diff.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Generate and run migrations on target Neon
        if: steps.diff.outputs.changed == 'true'
        run: bun run db:generate && bun run db:migrate

name: Neon Branch Sync

on:
  create:
    types: [branch]
  delete:
    types: [branch]
  pull_request:
    types: [closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.ref || github.event.pull_request.head.ref }}

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

jobs:
  # --- Create Neon branch when a new git branch is pushed ---
  create_neon_branch:
    name: Create Neon Branch
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.event.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set branch expiry (2 weeks)
        id: expiry
        run: echo "expires_at=$(date -u -d '+14 days' '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon Branch
        id: create
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ steps.branch.outputs.name }}
          parent_branch: main
          api_key: ${{ env.NEON_API_KEY }}
          expires_at: ${{ steps.expiry.outputs.expires_at }}

  # --- Delete Neon branch when a git branch is deleted ---
  delete_neon_branch:
    name: Delete Neon Branch
    if: |
      github.event_name == 'delete' &&
      github.event.ref_type == 'branch' &&
      github.event.ref_name != 'main' &&
      github.event.ref_name != 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.event.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ steps.branch.outputs.name }}
          api_key: ${{ env.NEON_API_KEY }}

  # --- On PR merge: check diff and run migrations on target branch ---
  migrate_on_merge:
    name: Migrate on PR Merge
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'staging')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Check for migration/schema changes
        id: diff
        run: |
          if git diff --name-only ${{ github.event.pull_request.merge_commit_sha }}^1 ${{ github.event.pull_request.merge_commit_sha }} | grep -qE '^packages/db/(migrations|schema)/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        if: steps.diff.outputs.changed == 'true'
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ github.event.pull_request.base.ref == 'main' && secrets.DATABASE_URL_MAIN || secrets.DATABASE_URL_STAGING }}

name: Neon Branch Sync

on:
  push:
    branches-ignore:
      - main
      - staging
  delete:
  pull_request:
    types: [closed]
    branches:
      - staging
      - main

concurrency:
  group: neon-${{ github.event_name }}-${{ github.event.ref || github.event.pull_request.head.ref }}
  cancel-in-progress: false

env:
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

jobs:
  # ── Create Neon branch when a feature branch is first pushed ──
  create_neon_branch:
    name: Create Neon Branch
    if: |
      github.event_name == 'push' &&
      !contains(github.event.ref, 'refs/heads/main') &&
      !contains(github.event.ref, 'refs/heads/staging') &&
      github.event.created == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract and sanitize branch name
        id: branch
        run: |
          RAW="${GITHUB_REF#refs/heads/}"
          echo "name=$(echo "$RAW" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Create Neon branch from staging
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ${{ steps.branch.outputs.name }}
          parent_branch: staging
          api_key: ${{ env.NEON_API_KEY }}

  # ── Delete Neon branch when a git branch is deleted ──
  delete_neon_branch:
    name: Delete Neon Branch
    if: |
      github.event_name == 'delete' &&
      github.event.ref_type == 'branch' &&
      github.event.ref != 'main' &&
      github.event.ref != 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize branch name
        id: branch
        run: echo "name=$(echo '${{ github.event.ref }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ${{ steps.branch.outputs.name }}
          api_key: ${{ env.NEON_API_KEY }}

  # ── Run migrations when a PR is merged ──
  migrate_on_merge:
    name: Migrate on PR Merge
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check for schema or migration changes
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'packages/db/schema/' 'packages/db/migrations/' || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.diff.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Generate and run migrations
        if: steps.diff.outputs.changed == 'true'
        run: bun run db:generate && bun run db:migrate
        env:
          DATABASE_URL: ${{ github.event.pull_request.base.ref == 'main' && secrets.DATABASE_URL_MAIN || secrets.DATABASE_URL_STAGING }}
          BETTER_AUTH_SECRET: "ci-placeholder-secret-that-is-at-least-32-characters-long"
          NEXT_PUBLIC_APP_URL: "https://placeholder.vercel.app"

pre-push:
  jobs:
    - run: bun x ultracite fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - run: bun x tsc --noEmit

post-checkout:
  jobs:
    - name: Switch Neon DB branch
      run: bash scripts/switch-db-branch.sh
